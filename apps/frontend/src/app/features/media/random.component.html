<div class="player-page">
  @if (loading()) {
    <div class="loading-screen">
      <div class="spinner"></div>
    </div>
  } @else if (error()) {
    <div class="error-screen">
      <p>{{ error() }}</p>
    </div>
  } @else if (media()) {
    <div class="player-container">

      @if (media()!.type === 'video') {
        <video
          class="video-element"
          [src]="media()!.url"
          autoplay
          muted
          playsinline
          preload="auto"
          loop
          (error)="onMediaError()"
        ></video>
        @if (needsTap()) {
          <button class="tap-overlay" (click)="activateSound()"></button>
        }
      }

      @if (media()!.type === 'image') {
        <img
          class="media-image"
          [src]="media()!.url"
          [alt]="media()!.name"
          (error)="onMediaError()"
        />
      }

    </div>
  }
</div>
