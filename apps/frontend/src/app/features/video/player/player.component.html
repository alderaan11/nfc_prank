<div class="player-page">
  @if (loading()) {
    <div class="loading-screen">
      <div class="spinner"></div>
    </div>
  } @else if (error()) {
    <div class="error-screen">
      <p>{{ error() }}</p>
    </div>
  } @else if (video()) {
    <div class="player-container">
      <video
        #videoEl
        class="video-element"
        [src]="video()!.url"
        playsinline
        preload="auto"
        (canplay)="onVideoReady()"
      ></video>

      @if (needsTap()) {
        <div class="tap-overlay" (click)="activateSound()"></div>
      }
    </div>
  }
</div>
