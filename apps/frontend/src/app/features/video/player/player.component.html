<div class="player-page">
  @if (loading()) {
    <div class="loading-screen">
      <div class="spinner"></div>
    </div>
  } @else if (error()) {
    <div class="error-screen">
      <p>{{ error() }}</p>
    </div>
  } @else if (video()) {
    <div class="player-container">
      <!-- autoplay + muted requis pour iOS Safari, playsinline pour ne pas ouvrir le player natif -->
      <video
        #videoEl
        class="video-element"
        [src]="video()!.url"
        autoplay
        muted
        playsinline
        preload="auto"
        loop
      ></video>

      <!-- Overlay transparent — premier tap active le son à fond -->
      @if (needsTap()) {
        <div class="tap-overlay" (click)="activateSound()"></div>
      }
    </div>
  }
</div>
