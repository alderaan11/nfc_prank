<div class="player-page">
  @if (loading()) {
    <div class="loading-screen">
      <div class="spinner"></div>
    </div>
  } @else if (error()) {
    <div class="error-screen">
      <p>{{ error() }}</p>
    </div>
  } @else if (video(); as v) {
    <div class="player-container">
      <h1 class="video-title">{{ v.title }}</h1>
      <video
        class="video-element"
        [src]="v.url"
        controls
        autoplay
        playsinline
        preload="auto"
      >
        Votre navigateur ne supporte pas la lecture vidéo.
      </video>
    </div>
  }
</div>
