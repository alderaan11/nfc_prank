<div class="video-card">
  <div class="card-info">
    <h3 class="card-title">{{ video.title }}</h3>
    <p class="card-meta">{{ video.filename }} &bull; {{ formatSize(video.size) }}</p>
    <p class="card-date">{{ video.createdAt | date: 'dd/MM/yyyy HH:mm' }}</p>
  </div>
  <div class="card-actions">
    <button class="btn-icon" title="Copier le lien NFC" (click)="copyLink.emit(video.id)">
      Copier lien
    </button>
    <button
      class="btn-icon btn-danger"
      title="Supprimer"
      (click)="delete.emit(video.id)"
    >
      Supprimer
    </button>
  </div>
</div>
